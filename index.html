    * {

    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .animate-spin {
      animation: spin 1s linear infinite;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.4s ease forwards;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .slide-up {
      animation: slideUp 0.5s ease forwards;
    }

    // ─── Currency Selector Component ─────────────────────────────────────────────
    function CurrencySelector({ current, onChange }) {
      const [open, setOpen] = useState(false);
      const [search, setSearch] = useState('');

      useEffect(() => {
        if (!open) setSearch('');
        function handleClick(e) {
          if (!e.target.closest('[data-currency-selector]')) setOpen(false);
        }
        if (open) document.addEventListener('mousedown', handleClick);
        return () => document.removeEventListener('mousedown', handleClick);
      }, [open]);

      const filtered = search.trim()
        ? CURRENCIES.filter(c =>
          c.code.toLowerCase().includes(search.toLowerCase()) ||
          c.name.toLowerCase().includes(search.toLowerCase()) ||
          c.country.toLowerCase().includes(search.toLowerCase()) ||
          c.symbol.toLowerCase().includes(search.toLowerCase())
        )
        : CURRENCIES;

      return h('div', { 'data-currency-selector': true, style: { position: 'relative', zIndex: 200 } },
        // Toggle button
        h('button', {
          onClick: () => setOpen(!open),
          className: 'flex items-center gap-1.5 px-3 py-2 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-xl text-sm font-bold text-gray-800 dark:text-gray-200 transition-all border-2 border-transparent hover:border-blue-300 dark:hover:border-blue-500'
        },
          h('span', { className: 'text-base leading-none' }, current.symbol),
          h('span', { className: 'hidden sm:inline text-xs font-bold text-blue-600 dark:text-blue-400' }, current.code),
          h('svg', { xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 20 20', fill: 'currentColor', className: 'w-3 h-3 text-gray-500 transition-transform ' + (open ? 'rotate-180' : '') },
            h('path', { fillRule: 'evenodd', d: 'M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z', clipRule: 'evenodd' })
          )
        ),
        // Dropdown
        open && h('div', {
          className: 'absolute right-0 top-full mt-2 w-80 bg-white dark:bg-gray-800 rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700 overflow-hidden fade-in'
        },
          // Search

    // ─── SIGN UP COMPONENT ────────────────────────────────────────────────────
    function SignUp({ onGoToLogin, onSuccess }) {
      const [form, setForm] = useState({ name: '', email: '', password: '', confirm: '' });
      const [errors, setErrors] = useState({});
      const [showPass, setShowPass] = useState(false);
      const [showConfirm, setShowConfirm] = useState(false);
      const [loading, setLoading] = useState(false);
      const [success, setSuccess] = useState(false);
      const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));

      function validate() {
        const e = {};
        if (!form.name.trim()) e.name = 'Full name is required';
        else if (form.name.trim().length < 2) e.name = 'Name must be at least 2 characters';
        if (!form.email) e.email = 'Email is required';
        else if (!/\S+@\S+\.\S+/.test(form.email)) e.email = 'Please enter a valid email';
        if (!form.password) e.password = 'Password is required';
        else if (form.password.length < 6) e.password = 'Password must be at least 6 characters';
        if (!form.confirm) e.confirm = 'Please confirm your password';
        else if (form.password !== form.confirm) e.confirm = 'Passwords do not match';
        const users = getUsers();
        if (users.find(u => u.email === form.email.toLowerCase())) e.email = 'An account with this email already exists';
        return e;
      }

      function handleSubmit(e) {
        e.preventDefault();
        const errs = validate();
        setErrors(errs);
        if (Object.keys(errs).length > 0) return;
        setLoading(true);
        setTimeout(() => {
          const users = getUsers();
          users.push({ name: form.name.trim(), email: form.email.toLowerCase(), password: form.password });
          saveUsers(users);
          setLoading(false);
          setSuccess(true);
          setTimeout(() => onGoToLogin(), 2500);
        }, 800);
      }

      const strengthScore = () => {
        let s = 0;
        if (form.password.length >= 6) s++;
        if (form.password.length >= 10) s++;
        if (/[A-Z]/.test(form.password)) s++;
        if (/[0-9]/.test(form.password)) s++;
        if (/[^A-Za-z0-9]/.test(form.password)) s++;
        return s;
      };
      const strength = strengthScore();
      const strengthLabel = ['', 'Weak', 'Fair', 'Good', 'Strong', 'Very Strong'][strength];
      const strengthColor = ['', 'bg-red-400', 'bg-orange-400', 'bg-yellow-400', 'bg-green-500', 'bg-emerald-500'][strength];

      return h(AuthCard, {
        title: 'Create Account', subtitle: 'Join MoneyManager today — it\'s free',
        icon: I.User('w-5 h-5 text-white')
      },
        success
          ? h('div', { className: 'py-6 text-center space-y-4 fade-in' },
            h('div', { className: 'w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto' },
              I.Check('w-10 h-10 text-green-500')
            ),
            h('h3', { className: 'text-xl font-bold text-gray-800' }, 'Account Created! 🎉'),
            h('p', { className: 'text-gray-500 text-sm' }, `Welcome, ${form.name.trim()}! Redirecting you to sign in...`),
            h('div', { className: 'flex justify-center gap-1' },
              [0, 1, 2].map(i => h('div', { key: i, className: 'w-2 h-2 bg-blue-500 rounded-full', style: { animation: `fadeIn 0.6s ${i * 0.2}s ease both` } }))
            )
          )
          : h('form', { onSubmit: handleSubmit, className: 'space-y-5' },
            h(InputField, { label: 'Full Name', type: 'text', value: form.name, onChange: set('name'), placeholder: 'John Smith', icon: I.User('w-4 h-4'), error: errors.name }),
            h(InputField, { label: 'Email Address', type: 'email', value: form.email, onChange: set('email'), placeholder: 'you@example.com', icon: I.Mail('w-4 h-4'), error: errors.email }),
            h('div', { className: 'space-y-1' },
              h('label', { className: 'block text-sm font-semibold text-gray-700' }, 'Password'),
              h('div', { className: 'relative' },
                h('div', { className: 'absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400' }, I.Lock('w-4 h-4')),
                h('input', {
                  type: showPass ? 'text' : 'password', value: form.password, onChange: set('password'), placeholder: 'At least 6 characters',
                  className: `w-full pl-11 pr-11 py-3.5 border-2 rounded-xl transition-all duration-200 outline-none text-sm ${errors.password ? 'border-red-400 bg-red-50 focus:border-red-500 focus:ring-4 focus:ring-red-100' : 'border-gray-200 bg-gray-50 focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-100'} placeholder:text-gray-400`
                }),
                h('button', { type: 'button', className: 'absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600', onClick: () => setShowPass(!showPass) },
                  showPass ? I.EyeOff('w-4 h-4') : I.Eye('w-4 h-4')
                )
              ),
              form.password && h('div', { className: 'space-y-1 mt-2' },
                h('div', { className: 'h-1.5 bg-gray-200 rounded-full overflow-hidden flex gap-0.5' },
                  [1, 2, 3, 4, 5].map(i => h('div', { key: i, className: `flex-1 rounded-full transition-all duration-300 ${i <= strength ? strengthColor : 'bg-transparent'}` }))
                ),
                h('p', { className: `text-xs font-medium ${['', 'text-red-500', 'text-orange-500', 'text-yellow-600', 'text-green-600', 'text-emerald-600'][strength]}` }, strengthLabel)
              ),
              errors.password && h('p', { className: 'text-red-500 text-xs flex items-center gap-1 fade-in' }, I.Alert('w-3 h-3'), errors.password)
            ),
            h('div', { className: 'space-y-1' },
              h('label', { className: 'block text-sm font-semibold text-gray-700' }, 'Confirm Password'),
              h('div', { className: 'relative' },
                h('div', { className: 'absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400' }, I.Shield('w-4 h-4')),
                h('input', {
                  type: showConfirm ? 'text' : 'password', value: form.confirm, onChange: set('confirm'), placeholder: 'Re-enter your password',
                  className: `w-full pl-11 pr-11 py-3.5 border-2 rounded-xl transition-all duration-200 outline-none text-sm ${errors.confirm ? 'border-red-400 bg-red-50 focus:border-red-500 focus:ring-4 focus:ring-red-100' : form.confirm && form.confirm === form.password ? 'border-green-400 bg-green-50 focus:border-green-500 focus:ring-4 focus:ring-green-100' : 'border-gray-200 bg-gray-50 focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-100'} placeholder:text-gray-400`
                }),
                h('button', { type: 'button', className: 'absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600', onClick: () => setShowConfirm(!showConfirm) },
                  showConfirm ? I.EyeOff('w-4 h-4') : I.Eye('w-4 h-4')
                )
              ),
              errors.confirm && h('p', { className: 'text-red-500 text-xs flex items-center gap-1 fade-in' }, I.Alert('w-3 h-3'), errors.confirm),
              form.confirm && form.confirm === form.password && h('p', { className: 'text-green-600 text-xs flex items-center gap-1' }, I.Check('w-3 h-3'), 'Passwords match')
            ),
            h(AuthButton, { type: 'submit', loading }, I.LogIn('w-4 h-4'), h('span', null, 'Create Account')),
            h('div', { className: 'text-center pt-2' },
              h('p', { className: 'text-gray-500 text-sm' },
                'Already have an account? ',
                h('button', { type: 'button', onClick: onGoToLogin, className: 'text-blue-600 hover:text-blue-700 font-semibold hover:underline transition-colors' }, 'Sign In')
              )
            )
          )
      );
    }

    // ─── SIGN IN COMPONENT ────────────────────────────────────────────────────
    function SignIn({ onGoToSignUp, onLoginSuccess }) {
      const [email, setEmail] = useState('');
      const [password, setPass] = useState('');
      const [showPass, setShowP] = useState(false);
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      function handleSubmit(e) {
        e.preventDefault();
        setError('');
        if (!email) { setError('Email address is required'); return; }
        if (!password) { setError('Password is required'); return; }
        setLoading(true);
        setTimeout(() => {
          const users = getUsers();
          const user = users.find(u => u.email === email.toLowerCase() && u.password === password);
          if (user) {
            localStorage.setItem('isAuthenticated', 'true');
            localStorage.setItem('userEmail', user.email);
            localStorage.setItem('userName', user.name);
            setLoading(false);
            onLoginSuccess();
          } else {
            setLoading(false);
            // Provide helpful error without revealing which field is wrong
            const emailExists = users.find(u => u.email === email.toLowerCase());
            setError(emailExists ? 'Incorrect password. Please try again.' : 'No account found with this email. Sign up first?');
          }
        }, 800);
      }

      const hasUsers = getUsers().length > 0;

      return h(AuthCard, {
        title: 'Welcome Back', subtitle: 'Sign in to your MoneyManager account',
        icon: I.LogIn('w-5 h-5 text-white')
      },

          h(InputField, { label: 'Email Address', type: 'email', value: email, onChange: e => setEmail(e.target.value), placeholder: 'you@example.com', icon: I.Mail('w-4 h-4') }),

              h('div', { className: 'absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400' }, I.Lock('w-4 h-4')),

              }),
              h('button', { type: 'button', className: 'absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors', onClick: () => setShowP(!showPass) },

    // ─── DASHBOARD ─────────────────────────────────────────────────────────────
    function Dashboard({ onLogout }) {
      const [dark, setDark] = useState(false);
      const [txns, setTxns] = useState([]);
      const [showInc, setShowInc] = useState(false);
      const [showExp, setShowExp] = useState(false);
      const [incForm, setIncForm] = useState({ amount: '', source: '' });
      const [expForm, setExpForm] = useState({ amount: '', category: '' });
      const [currency, setCurrency] = useState(() => {
        const saved = localStorage.getItem('mm_currency');
        return saved ? JSON.parse(saved) : { code: 'USD', symbol: '$', name: 'US Dollar', country: 'United States' };
      });

      useEffect(() => {
        const saved = localStorage.getItem('transactions');
        if (saved) setTxns(JSON.parse(saved));
        if (localStorage.getItem('theme') === 'dark') setDark(true);
      }, []);
      useEffect(() => { localStorage.setItem('transactions', JSON.stringify(txns)); }, [txns]);
      useEffect(() => { localStorage.setItem('theme', dark ? 'dark' : 'light'); }, [dark]);
      useEffect(() => { localStorage.setItem('mm_currency', JSON.stringify(currency)); }, [currency]);

      function handleCurrencyChange(c) { setCurrency(c); }

      const totalInc = txns.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const totalExp = txns.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
      const balance = totalInc - totalExp;

      function addIncome() {
        if (!incForm.amount || !incForm.source) return;
        setTxns([{ id: Date.now().toString(), type: 'income', amount: parseFloat(incForm.amount), category: 'Income', source: incForm.source, date: new Date().toLocaleDateString(), timestamp: Date.now() }, ...txns]);
        setIncForm({ amount: '', source: '' }); setShowInc(false);
      }
      function addExpense() {
        if (!expForm.amount || !expForm.category) return;
        setTxns([{ id: Date.now().toString(), type: 'expense', amount: parseFloat(expForm.amount), category: expForm.category, date: new Date().toLocaleDateString(), timestamp: Date.now() }, ...txns]);
        setExpForm({ amount: '', category: '' }); setShowExp(false);
      }
      function delTxn(id) { setTxns(txns.filter(t => t.id !== id)); }

      const expByCat = EXPENSE_CATEGORIES.map(cat => ({ name: cat, value: txns.filter(t => t.type === 'expense' && t.category === cat).reduce((s, t) => s + t.amount, 0) })).filter(i => i.value > 0);
      const last7 = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(); d.setDate(d.getDate() - (6 - i));
        const ds = d.toLocaleDateString();
        return { date: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }), income: txns.filter(t => t.type === 'income' && t.date === ds).reduce((s, t) => s + t.amount, 0), expense: txns.filter(t => t.type === 'expense' && t.date === ds).reduce((s, t) => s + t.amount, 0) };
      });

      const userName = getUserName();
      const userEmail = getUserEmail();
      const initials = userName ? userName.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) : 'U';

      return h('div', { className: dark ? 'dark' : '' },
        h('div', { className: 'min-h-screen bg-gradient-to-br from-blue-50 via-white to-green-50 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 transition-colors duration-300' },

          // Hero
          h('section', { className: 'relative overflow-hidden text-white py-20', style: { backgroundImage: "url('/hero-bg.jpg')", backgroundSize: 'cover', backgroundPosition: 'center', backgroundRepeat: 'no-repeat' } },
            h('div', { className: 'absolute inset-0', style: { background: 'linear-gradient(135deg, rgba(37,99,235,0.82) 0%, rgba(5,150,105,0.75) 100%)' } }),
            h('div', { className: 'container mx-auto px-4 relative z-10' },
              h('div', { className: 'max-w-4xl mx-auto text-center' },
                h('h1', { className: 'text-5xl md:text-6xl font-bold mb-6' }, 'Smart Money Management'),
                h('p', { className: 'text-xl md:text-2xl mb-8 text-blue-100' }, 'Track expenses, manage income, grow your business'),
                h('div', { className: 'flex gap-4 justify-center flex-wrap' },
                  h('button', { onClick: () => { setShowInc(true); setShowExp(false); setTimeout(() => { const el = document.getElementById('add-income-form'); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 50); }, className: 'px-8 py-4 bg-white text-blue-600 rounded-xl font-semibold hover:bg-blue-50 transition-colors shadow-lg' }, 'Get Started'),
                  h('button', { className: 'px-8 py-4 bg-transparent border-2 border-white text-white rounded-xl font-semibold hover:bg-white/10 transition-colors' }, 'Watch Demo')
                )
              )
            )
          ),

          // Sticky Nav
          h('nav', { className: 'sticky top-0 z-50 bg-white/80 dark:bg-gray-800/80 backdrop-blur-lg border-b border-gray-200 dark:border-gray-700' },
            h('div', { className: 'container mx-auto px-4' },
              h('div', { className: 'flex items-center justify-between h-16' },
                h('div', { className: 'flex items-center gap-2' },
                  I.Dollar('w-8 h-8 text-blue-600 dark:text-blue-400'),
                  h('span', { className: 'text-xl font-bold text-gray-900 dark:text-white' }, 'MoneyManager')
                ),
                h('div', { className: 'flex items-center gap-3' },
                  // User avatar
                  h('div', { className: 'hidden md:flex items-center gap-2' },
                    h('div', { className: 'w-8 h-8 bg-gradient-to-br from-blue-500 to-green-500 rounded-full flex items-center justify-center text-white text-xs font-bold' }, initials),
                    h('div', { className: 'hidden lg:block' },
                      h('p', { className: 'text-xs font-semibold text-gray-900 dark:text-white leading-none' }, userName),
                      h('p', { className: 'text-xs text-gray-500 dark:text-gray-400' }, userEmail)
                    )
                  ),
                  h(CurrencySelector, { current: currency, onChange: handleCurrencyChange }),
                  h('button', { onClick: () => setDark(!dark), className: 'p-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors' },
                    dark ? I.Sun('w-5 h-5') : I.Moon('w-5 h-5')
                  ),
                  h('button', { onClick: onLogout, className: 'flex items-center gap-2 px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-semibold transition-all hover:shadow-lg text-sm' },
                    I.LogOut('w-4 h-4'),
                    h('span', { className: 'hidden sm:inline' }, 'Logout')
                  )
                )
              )
            )
          ),

          // Content
          h('div', { className: 'container mx-auto px-4 py-8' },
            // Stats
            h('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-6 mb-8' },
              // Income card
              h('div', { className: 'bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg border border-gray-200 dark:border-gray-700 hover:shadow-xl transition-shadow' },
                h('div', { className: 'flex items-center justify-between mb-4' },
                  h('h3', { className: 'text-gray-600 dark:text-gray-400 text-sm font-medium' }, 'Total Income'),
                  h('div', { className: 'p-2 bg-green-100 dark:bg-green-900/30 rounded-xl' }, I.TrendUp('w-5 h-5 text-green-600 dark:text-green-400'))
                ),
                h('p', { className: 'text-3xl font-bold text-gray-900 dark:text-white' }, currency.symbol + totalInc.toFixed(2)),
                h('p', { className: 'text-xs text-green-600 dark:text-green-400 mt-1 font-medium' }, '↑ All time')
              ),
              // Expense card
              h('div', { className: 'bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg border border-gray-200 dark:border-gray-700 hover:shadow-xl transition-shadow' },
                h('div', { className: 'flex items-center justify-between mb-4' },
                  h('h3', { className: 'text-gray-600 dark:text-gray-400 text-sm font-medium' }, 'Total Expenses'),
                  h('div', { className: 'p-2 bg-red-100 dark:bg-red-900/30 rounded-xl' }, I.TrendDn('w-5 h-5 text-red-600 dark:text-red-400'))
                ),
                h('p', { className: 'text-3xl font-bold text-gray-900 dark:text-white' }, currency.symbol + totalExp.toFixed(2)),
                h('p', { className: 'text-xs text-red-600 dark:text-red-400 mt-1 font-medium' }, '↓ All time')
              ),
              // Balance card
              h('div', { className: `rounded-2xl p-6 shadow-lg border hover:shadow-xl transition-shadow ${balance >= 0 ? 'bg-gradient-to-br from-blue-500 to-blue-600 border-blue-400' : 'bg-gradient-to-br from-red-500 to-red-600 border-red-400'}` },
                h('div', { className: 'flex items-center justify-between mb-4' },
                  h('h3', { className: 'text-white text-sm font-medium' }, 'Net Balance'),
                  h('div', { className: 'p-2 bg-white/20 rounded-xl' }, I.Dollar('w-5 h-5 text-white'))
                ),
                h('p', { className: 'text-3xl font-bold text-white' }, currency.symbol + balance.toFixed(2)),
                h('p', { className: 'text-xs text-white/80 mt-1 font-medium' }, balance >= 0 ? 'You\'re in the green! 💚' : 'Expenses exceed income')
              )
            ),

            // Action buttons
            h('div', { className: 'grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8' },
              h('button', { onClick: () => { setShowInc(!showInc); setShowExp(false) }, className: 'flex items-center justify-center gap-2 p-4 bg-green-600 hover:bg-green-700 text-white rounded-xl font-semibold transition-all hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0' },
                I.Plus('w-5 h-5'), 'Add Income'
              ),
              h('button', { onClick: () => { setShowExp(!showExp); setShowInc(false) }, className: 'flex items-center justify-center gap-2 p-4 bg-red-600 hover:bg-red-700 text-white rounded-xl font-semibold transition-all hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0' },
                I.Plus('w-5 h-5'), 'Add Expense'
              )
            ),

            // Income form
            showInc && h('div', { id: 'add-income-form', className: 'bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg border border-gray-200 dark:border-gray-700 mb-8 fade-in' },
              h('h3', { className: 'text-xl font-bold text-gray-900 dark:text-white mb-4' }, 'Add Income'),
              h('div', { className: 'space-y-4' },
                h('input', { type: 'number', placeholder: 'Amount ($)', value: incForm.amount, onChange: e => setIncForm({ ...incForm, amount: e.target.value }), className: 'w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-gray-50 focus:border-green-500 focus:bg-white focus:ring-4 focus:ring-green-100 outline-none text-sm transition-all' }),
                h('select', { value: incForm.source, onChange: e => setIncForm({ ...incForm, source: e.target.value }), className: 'w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-gray-50 dark:bg-gray-700 dark:text-white focus:border-green-500 focus:ring-4 focus:ring-green-100 outline-none text-sm transition-all' },
                  h('option', { value: '' }, 'Select Income Source'),
                  ...INCOME_SOURCES.map(s => h('option', { key: s, value: s }, s))
                ),
                h('div', { className: 'flex gap-3' },
                  h('button', { onClick: addIncome, className: 'flex-1 px-4 py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-semibold transition-all hover:shadow-md' }, 'Add Income'),
                  h('button', { onClick: () => setShowInc(false), className: 'px-4 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-semibold transition-colors' }, 'Cancel')
                )
              )
            ),

            // Expense form
            showExp && h('div', { className: 'bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg border border-gray-200 dark:border-gray-700 mb-8 fade-in' },
              h('h3', { className: 'text-xl font-bold text-gray-900 dark:text-white mb-4' }, 'Add Expense'),
              h('div', { className: 'space-y-4' },
                h('input', { type: 'number', placeholder: 'Amount ($)', value: expForm.amount, onChange: e => setExpForm({ ...expForm, amount: e.target.value }), className: 'w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-gray-50 focus:border-red-500 focus:bg-white focus:ring-4 focus:ring-red-100 outline-none text-sm transition-all' }),
                h('select', { value: expForm.category, onChange: e => setExpForm({ ...expForm, category: e.target.value }), className: 'w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-gray-50 dark:bg-gray-700 dark:text-white focus:border-red-500 focus:ring-4 focus:ring-red-100 outline-none text-sm transition-all' },
                  h('option', { value: '' }, 'Select Category'),
                  ...EXPENSE_CATEGORIES.map(c => h('option', { key: c, value: c }, c))
                ),
                h('div', { className: 'flex gap-3' },
                  h('button', { onClick: addExpense, className: 'flex-1 px-4 py-3 bg-red-600 hover:bg-red-700 text-white rounded-xl font-semibold transition-all hover:shadow-md' }, 'Add Expense'),
                  h('button', { onClick: () => setShowExp(false), className: 'px-4 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-semibold transition-colors' }, 'Cancel')
                )
              )
            ),

            // Charts
            h('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8' },
              h('div', { className: 'bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg border border-gray-200 dark:border-gray-700' },
                h('h3', { className: 'text-lg font-bold text-gray-900 dark:text-white mb-4' }, '7-Day Income vs Expenses'),
                h(ResponsiveContainer, { width: '100%', height: 250 },
                  h(LineChart, { data: last7 },
                    h(CartesianGrid, { strokeDasharray: '3 3', stroke: dark ? '#374151' : '#f3f4f6' }),
                    h(XAxis, { dataKey: 'date', stroke: dark ? '#9ca3af' : '#6b7280', fontSize: 12 }),
                    h(YAxis, { stroke: dark ? '#9ca3af' : '#6b7280', fontSize: 12 }),
                    h(Tooltip, { contentStyle: { backgroundColor: dark ? '#1f2937' : '#fff', border: '1px solid ' + (dark ? '#374151' : '#e5e7eb'), borderRadius: '12px', fontSize: '12px' } }),
                    h(Line, { type: 'monotone', dataKey: 'income', stroke: '#10b981', strokeWidth: 3, dot: { r: 4, fill: '#10b981' } }),
                    h(Line, { type: 'monotone', dataKey: 'expense', stroke: '#ef4444', strokeWidth: 3, dot: { r: 4, fill: '#ef4444' } })
                  )
                )
              ),
              h('div', { className: 'bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg border border-gray-200 dark:border-gray-700' },
                h('h3', { className: 'text-lg font-bold text-gray-900 dark:text-white mb-4' }, 'Expenses by Category'),
                expByCat.length === 0
                  ? h('div', { className: 'flex flex-col items-center justify-center h-64 text-gray-400' },
                    I.Pie('w-12 h-12 mb-3 opacity-30'),
                    h('p', null, 'Add expenses to see the breakdown')
                  )
                  : h(ResponsiveContainer, { width: '100%', height: 250 },
                    h(RC_PieChart, null,
                      h(Pie, { data: expByCat, cx: '50%', cy: '50%', labelLine: false, label: ({ name }) => name, outerRadius: 80, dataKey: 'value' },
                        ...expByCat.map((_, i) => h(Cell, { key: 'c' + i, fill: COLORS[i % COLORS.length] }))
                      ),
                      h(Tooltip, { contentStyle: { backgroundColor: dark ? '#1f2937' : '#fff', borderRadius: '12px', fontSize: '12px' } })
                    )
                  )
              )
            ),

            // Transactions
            h('div', { className: 'bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg border border-gray-200 dark:border-gray-700 mb-8' },
              h('div', { className: 'flex items-center justify-between mb-6' },
                h('h3', { className: 'text-lg font-bold text-gray-900 dark:text-white' }, 'Recent Transactions'),
                txns.length > 0 && h('span', { className: 'text-xs text-gray-500 bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded-lg' }, txns.length + ' total')
              ),
              txns.length === 0
                ? h('div', { className: 'flex flex-col items-center justify-center py-12 text-gray-400' },
                  I.Dollar('w-12 h-12 mb-3 opacity-30'),
                  h('p', { className: 'font-medium' }, 'No transactions yet'),
                  h('p', { className: 'text-sm' }, 'Add income or expenses above to get started')
                )
                : h('div', { className: 'space-y-3' },
                  txns.slice(0, 10).map(t =>
                    h('div', { key: t.id, className: 'flex items-center justify-between p-4 bg-gray-50 dark:bg-gray-700 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors group' },
                      h('div', { className: 'flex items-center gap-3' },
                        h('div', { className: 'p-2 rounded-xl ' + (t.type === 'income' ? 'bg-green-100 dark:bg-green-900/30' : 'bg-red-100 dark:bg-red-900/30') },
                          t.type === 'income' ? I.Up('w-4 h-4 text-green-600 dark:text-green-400') : I.Down('w-4 h-4 text-red-600 dark:text-red-400')
                        ),
                        h('div', null,
                          h('p', { className: 'font-semibold text-gray-900 dark:text-white text-sm' }, t.type === 'income' ? t.source : t.category),
                          h('p', { className: 'text-xs text-gray-500 dark:text-gray-400' }, t.date)
                        )
                      ),
                      h('div', { className: 'flex items-center gap-3' },
                        h('p', { className: 'font-bold ' + (t.type === 'income' ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400') },
                          (t.type === 'income' ? '+' : '-') + currency.symbol + t.amount.toFixed(2)
                        ),
                        h('button', { onClick: () => delTxn(t.id), className: 'p-1.5 hover:bg-red-100 dark:hover:bg-red-900/30 rounded-lg transition-colors opacity-0 group-hover:opacity-100' },
                          I.Trash('w-3.5 h-3.5 text-red-500')
                        )
                      )
                    )
                  )
                )
            ),

            // Features section
            h('section', { className: 'py-16' },
              h('h2', { className: 'text-3xl font-bold text-center text-gray-900 dark:text-white mb-12' }, 'Why Choose MoneyManager?'),
              h('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-8' },
                ...[
                  { icon: I.Target, title: 'Goal Tracking', desc: 'Set financial goals and track progress' },
                  { icon: I.Pie, title: 'Smart Analytics', desc: 'Deep insights into spending patterns' },
                  { icon: I.Award, title: 'Business Ready', desc: 'Built for entrepreneurs and teams' }
                ].map(({ icon, title, desc }, i) =>
                  h('div', { key: i, className: 'bg-white dark:bg-gray-800 rounded-2xl p-8 shadow-lg border border-gray-200 dark:border-gray-700 text-center hover:shadow-xl transition-all hover:-translate-y-1' },
                    h('div', { className: 'inline-flex p-4 bg-blue-100 dark:bg-blue-900/30 rounded-2xl mb-4' }, icon('w-8 h-8 text-blue-600 dark:text-blue-400')),
                    h('h3', { className: 'text-lg font-bold text-gray-900 dark:text-white mb-2' }, title),
                    h('p', { className: 'text-gray-500 dark:text-gray-400 text-sm' }, desc)
                  )
                )
              )
            ),

            h('footer', { className: 'py-8 border-t border-gray-200 dark:border-gray-700 text-center text-gray-500 dark:text-gray-400 text-sm' },
              h('p', null, '© 2024 MoneyManager. All rights reserved.')
            )
          )
        )
      );
    }

    // ─── APP ROOT ─────────────────────────────────────────────────────────────
    function App() {
      const [page, setPage] = useState(() => {
        if (getSession()) return 'dashboard';
        return 'signin';
      });

      function handleLogout() {
        localStorage.removeItem('isAuthenticated');
        localStorage.removeItem('userEmail');
        localStorage.removeItem('userName');
        setPage('signin');
      }

      if (page === 'signup') return h(SignUp, { onGoToLogin: () => setPage('signin') });
      if (page === 'dashboard') return h(Dashboard, { onLogout: handleLogout });
      return h(SignIn, { onGoToSignUp: () => setPage('signup'), onLoginSuccess: () => setPage('dashboard') });
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App, null));
  </script>
</body>

</html>
